name: Quality Assurance

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  quality-assurance:
    strategy:
      matrix:
        node: [22, 24, 26]
        script: ["yarn tsc", "yarn test"]
      # Default behaviour is "true" - which cancels all queued or in-progress jobs when one fails, which we don't want.
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
      - name: Checking out git
        uses: actions/checkout@v5
      - name: Enable Corepack
        run: corepack enable
      - name: Setup node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: "yarn"
      - name: Install Dependencies
        run: yarn install --frozen-lockfile
      - name: Install Dependencies
        run: yarn up @types/node@${{ matrix.node }}
      - name: Script
        run: ${{ matrix.script }}
  formatting:
    strategy:
      matrix:
        script: ["yarn build", "yarn eslint .", "yarn prettier . --check"]
      # Default behaviour is "true" - which cancels all queued or in-progress jobs when one fails, which we don't want.
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
      - name: Checking out git
        uses: actions/checkout@v5
      - name: Enable Corepack
        run: corepack enable
      - name: Setup node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: "yarn"
      - name: Install Dependencies
        run: yarn install --frozen-lockfile
      - name: Script
        run: ${{ matrix.script }}
